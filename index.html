<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Estimator Project</title>
</head>
<body>

  <h2>Estimator Project</h2>

  <label>Hari Kerja:</label>
  <input type="number" id="hari" value="7"><br><br>

  <label>Pilih Tim:</label>
  <select id="tim">
    <option value="1">Tim 1</option>
    <option value="2">Tim 2</option>
    <option value="3">Tim 3</option>
  </select><br><br>

  <button onclick="hitung()">Hitung</button>

  <h3>Hasil:</h3>
  <pre id="output"></pre>

  <script>
    function hitungProject(hariKerja, tim) {

      if (hariKerja <= 0) {
        return "Hari kerja harus lebih dari 0";
      }

      const TRANSPORT_AWAL_AKHIR = 130000;
      const TRANSPORT_HARIAN = 30000;
      const LISTRIK = 100000;
      const MARGIN = 0.3;

      const hargaTim = {
        1: 455000,
        2: 420000,
        3: 390000
      };

      if (!hargaTim[tim]) {
        return "Tim tidak valid";
      }

      let biayaTransport = 0;

      if (hariKerja === 1) {
        biayaTransport = TRANSPORT_AWAL_AKHIR;
      } else {
        const hariTengah = hariKerja - 2;
        biayaTransport =
          (TRANSPORT_AWAL_AKHIR * 2) +
          (hariTengah * TRANSPORT_HARIAN);
      }

      const biayaUpah = hargaTim[tim] * hariKerja;

      const totalBiaya =
        biayaTransport +
        biayaUpah +
        LISTRIK;

      const hargaJual = totalBiaya * (1 + MARGIN);
      const profit = hargaJual - totalBiaya;

      return {
        biayaTransport,
        biayaUpah,
        listrik: LISTRIK,
        totalBiaya,
        hargaJual,
        profit
      };
    }

    function hitung() {
      const hari = parseInt(document.getElementById("hari").value);
      const tim = parseInt(document.getElementById("tim").value);

      const hasil = hitungProject(hari, tim);

      if (typeof hasil === "string") {
        document.getElementById("output").innerText = hasil;
        return;
      }

      document.getElementById("output").innerText = 
`Transport   : Rp ${hasil.biayaTransport.toLocaleString()}
Upah        : Rp ${hasil.biayaUpah.toLocaleString()}
Listrik     : Rp ${hasil.listrik.toLocaleString()}
Total Modal : Rp ${hasil.totalBiaya.toLocaleString()}
Harga Jual  : Rp ${hasil.hargaJual.toLocaleString()}
Profit      : Rp ${hasil.profit.toLocaleString()}`;
    }
  </script>

</body>
</html>
