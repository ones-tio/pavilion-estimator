```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pavilion Estimator</title>
<style>
body{
font-family:Arial;
max-width:500px;
margin:auto;
padding:20px;
background:#f2f4f7;
}
.box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h1{
text-align:center;
font-size:26px;
color:#12395b;
}
input,select,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}
button{
background:#12395b;
color:white;
font-weight:bold;
border:none;
}
#hasil{
margin-top:20px;
line-height:1.8;
font-size:16px;
}
</style>
</head>
<body>

<div class="box">
<h1>Pavilion Kanopi Bogor</h1>

<select id="jenis">
<option value="0.83">Twinwall</option>
<option value="0.76">RS</option>
</select>

<input id="lebar" type="number" placeholder="Lebar Area (meter)">
<input id="panjang" type="number" placeholder="Bentang Air (meter)">
<input id="eser" type="number" placeholder="Panjang Depan Eser (meter)">

<button onclick="hitung()">HITUNG</button>

<div id="hasil"></div>
</div>

<script>
function hitung(){
let eff = parseFloat(document.getElementById('jenis').value);
let lebar = parseFloat(document.getElementById('lebar').value);
let panjang = parseFloat(document.getElementById('panjang').value);
let eser = parseFloat(document.getElementById('eser').value);

if(!lebar || !panjang || !eser){
document.getElementById('hasil').innerHTML="Lengkapi semua data.";
return;
}

let lembar = Math.ceil(lebar/eff);
let luas = (lebar*panjang).toFixed(2);

let h510 = (2*(lebar+panjang)+lebar);
let b510 = Math.ceil(h510/6);

let h46 = (lebar*3)+(panjang*4);
let b46 = Math.ceil(h46/6);

let pleser = (eser*0.22).toFixed(2);

document.getElementById('hasil').innerHTML =
"<hr>" +
"Luas Atap: <b>"+luas+" m²</b><br>" +
"Jumlah Lembar: <b>"+lembar+"</b><br>" +
"Hollow 5x10: <b>"+b510+" batang</b><br>" +
"Hollow 4x6: <b>"+b46+" batang</b><br>" +
"Plat Eser: <b>"+pleser+" m²</b>";
}
</script>

</body>
</html>
```
