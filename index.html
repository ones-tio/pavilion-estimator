```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pavilion Estimator MASTER</title>
<style>
body{font-family:Arial;max-width:560px;margin:auto;padding:20px;background:#f2f4f7}
.box{background:#fff;padding:20px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,.1)}
h1{text-align:center;color:#12395b;font-size:24px}
input,select,button{width:100%;padding:12px;margin-top:10px;font-size:16px;border-radius:8px;border:1px solid #ccc;box-sizing:border-box}
button{background:#12395b;color:#fff;font-weight:bold;border:none}
#hasil{margin-top:20px;line-height:1.8;font-size:16px}
label{font-weight:bold;margin-top:10px;display:block}
small{color:#666}
</style>
</head>
<body>

<div class="box">

<h1>Pavilion Kanopi Bogor</h1>

<label>Bentuk Kanopi</label>
<select id="bentuk" onchange="ubahForm()">
<option value="kotak">Persegi</option>
<option value="L">L Shape</option>
</select>

<label>Jenis Atap</label>
<select id="jenis">
<option value="0.83">Twinwall</option>
<option value="0.76">RS</option>
</select>

<div id="kotakForm">
<input id="lebar" type="number" step="0.1" placeholder="Lebar Area (m)">
<input id="panjang" type="number" step="0.1" placeholder="Bentang Air (m)">
</div>

<div id="LForm" style="display:none">
<input id="a1" type="number" step="0.1" placeholder="Panjang Area A (m)">
<input id="a2" type="number" step="0.1" placeholder="Lebar Area A (m)">
<input id="b1" type="number" step="0.1" placeholder="Panjang Area B (m)">
<input id="b2" type="number" step="0.1" placeholder="Lebar Area B (m)">
</div>

<input id="talang" type="number" step="0.1" placeholder="Panjang Talang (opsional)">

<select id="cordoba">
<option value="0">Cordoba (tidak ada)</option>
<option value="1">Cordoba 1</option>
<option value="2">Cordoba 2</option>
<option value="3">Cordoba 3</option>
</select>

<button onclick="hitung()">HITUNG MATERIAL</button>

<div id="hasil"></div>
<small>Batang hollow = panjang 6 meter</small>

</div>

<script>
function ubahForm(){
let b=document.getElementById("bentuk").value;
document.getElementById("kotakForm").style.display=b=="kotak"?"block":"none";
document.getElementById("LForm").style.display=b=="L"?"block":"none";
}

function stok(p){
if(p<=3)return 3;
if(p<=4)return 4;
if(p<=6)return 6;
return p.toFixed(1)+" Custom";
}

function batang(x){ return Math.ceil(x/6); }

function hitung(){

let bentuk=document.getElementById("bentuk").value;
let eff=parseFloat(document.getElementById("jenis").value);
let jenis=document.getElementById("jenis").selectedOptions[0].text;
let talang=parseFloat(document.getElementById("talang").value)||0;
let cordoba=parseInt(document.getElementById("cordoba").value);

let luas=0,h510=0,h46=0,lembar=0,bentang=0,lebarHitung=0;

if(bentuk=="kotak"){

let lebar=parseFloat(document.getElementById("lebar").value);
let panjang=parseFloat(document.getElementById("panjang").value);

if(!lebar||!panjang){hasil.innerHTML="Isi data dulu";return;}

luas=lebar*panjang;
lebarHitung=lebar;
bentang=panjang;

lembar=Math.ceil(lebar/eff);

h510=(2*(lebar+panjang))+lebar;
h46=(lebar*3)+(panjang*4);

}

if(bentuk=="L"){

let a1=parseFloat(document.getElementById("a1").value);
let a2=parseFloat(document.getElementById("a2").value);
let b1=parseFloat(document.getElementById("b1").value);
let b2=parseFloat(document.getElementById("b2").value);

if(!a1||!a2||!b1||!b2){hasil.innerHTML="Isi data L Shape dulu";return;}

luas=(a1*a2)+(b1*b2);

/* atap area terpisah */
let lembarA=Math.ceil(a1/eff);
let lembarB=Math.ceil(b1/eff);

lembar=lembarA+lembarB;

bentang=Math.max(a2,b2);

/* hollow area terpisah */
h510=((2*(a1+a2))+a1)+((2*(b1+b2))+b1);
h46=((a1*3)+(a2*4))+((b1*3)+(b2*4));

lebarHitung=a1+b1;
}

/* tambah talang */
if(talang>0){ h510+=talang; }

let eser=0;
let lembarEser=0;

if(talang>0){
eser=talang*0.30;
lembarEser=Math.ceil(eser/2.88);
}

/* cordoba */
let c44=0,c24=0;

if(cordoba==1){
c44=lebarHitung;
c24=lebarHitung;
}
if(cordoba==2){
c44=lebarHitung+bentang;
c24=lebarHitung+bentang;
}
if(cordoba==3){
c44=(2*bentang)+lebarHitung;
c24=(2*bentang)+lebarHitung;
}

hasil.innerHTML=
"<hr>"+
"<b>Bentuk:</b> "+(bentuk=="kotak"?"Persegi":"L Shape")+"<br>"+
"<b>ATAP:</b><br>"+jenis+" "+stok(bentang)+" m x "+lembar+" lembar<br>"+
"Luas: "+luas.toFixed(2)+" m²<br><br>"+

"<b>HOLLOW:</b><br>"+
"5x10 = "+h510.toFixed(1)+" m / "+batang(h510)+" batang<br>"+
"4x6 = "+h46.toFixed(1)+" m / "+batang(h46)+" batang<br>"+

(c44>0?"4x4 = "+c44.toFixed(1)+" m / "+batang(c44)+" batang<br>":"")+
(c24>0?"2x4 = "+c24.toFixed(1)+" m / "+batang(c24)+" batang<br>":"")+

(talang>0?"<br><b>TALANG:</b><br>Plat Eser = "+eser.toFixed(2)+" m² / "+lembarEser+" lembar":"");

}
</script>

</body>
</html>
